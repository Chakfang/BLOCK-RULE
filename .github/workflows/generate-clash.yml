name: Generate Clash MRS Rules

on:
  push:
    paths:
      - 'list.txt'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Generate MRS files
        run: |
          python3 << 'EOF'
          import struct
          
          # Read domains from list.txt (remove line numbers)
          with open('list.txt', 'r', encoding='utf-8') as f:
              domains = []
              for line in f:
                  line = line.strip()
                  if line and '|' in line:
                      domain = line.split('|', 1)[1].strip()
                      if domain:
                          domains.append(domain)
                  elif line and not line.startswith('['):
                      domains.append(line)
          
          # Generate binary .mrs format
          mrs_data = bytearray()
          mrs_data.extend(b'MRS\x00')  # Magic header
          mrs_data.extend(struct.pack('>I', 1))  # Version
          mrs_data.extend(struct.pack('>I', len(domains)))  # Domain count
          
          # Add each domain
          for domain in domains:
              domain_bytes = domain.encode('utf-8')
              mrs_data.extend(struct.pack('>H', len(domain_bytes)))
              mrs_data.extend(domain_bytes)
          
          # Write binary file
          with open('rules.mrs', 'wb') as f:
              f.write(mrs_data)
          
          # Also generate YAML version for reference
          yaml_content = ["payload:"]
          for domain in domains:
              yaml_content.append(f"  - DOMAIN-SUFFIX,{domain}")
          
          with open('rules.mrs.yaml', 'w', encoding='utf-8') as f:
              f.write('\n'.join(yaml_content))
          
          print(f"✓ Generated rules.mrs ({len(mrs_data)} bytes)")
          print(f"✓ Generated rules.mrs.yaml with {len(domains)} domains")
          EOF
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rules.mrs rules.mrs.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update rules from list.txt" && git push)
