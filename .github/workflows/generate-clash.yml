name: Generate Clash MRS Rules

on:
  push:
    paths:
      - 'list.txt'
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Generate MRS file
        run: |
          python3 << 'EOF'
          with open('list.txt', 'r', encoding='utf-8') as f:
              domains = [line.strip() for line in f if line.strip()]
          
          # Generate MRS format
          mrs_content = ["payload:"]
          for domain in domains:
              mrs_content.append(f"  - DOMAIN-SUFFIX,{domain}")
          
          with open('rules.mrs.yaml', 'w', encoding='utf-8') as f:
              f.write('\n'.join(mrs_content))
          
          print(f"✓ Generated rules.mrs.yaml with {len(domains)} rules")
          EOF
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rules.mrs.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update rules.mrs.yaml from list.txt" && git push)
