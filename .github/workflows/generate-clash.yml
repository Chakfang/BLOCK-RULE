name: Generate Clash Rules

on:
  push:
    paths:
      - 'list.txt'
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Generate clash.txt
        run: |
          python3 << 'EOF'
          with open('list.txt', 'r', encoding='utf-8') as f:
              domains = [line.strip() for line in f if line.strip()]
          
          clash_content = []
          for domain in domains:
              clash_content.append(f"DOMAIN-SUFFIX,{domain}")
          
          with open('clash.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(clash_content))
          
          print(f"✓ Generated clash.txt with {len(clash_content)} rules")
          EOF
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add clash.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update clash.txt from list.txt" && git push)
