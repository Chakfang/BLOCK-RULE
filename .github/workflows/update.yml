name: Update KR Block List

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Source List
        run: |
          curl -L "https://github.com/Chakfang/BLOCK-RULE/main/list.txt" -o source.txt

      - name: Generate Clash Rule File
        run: |
          grep -v '^#' source.txt | grep -v '^$' | sed 's/^/DOMAIN-SUFFIX,/' > clash.txt

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add clash.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update KR block rules"
            git push
          fi
